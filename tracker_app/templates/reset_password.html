{% extends 'base.html' %}

{% block title %}Reset Password Credentials{% endblock %}

{% block layout_container %}
<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1055;">
    <div id="liveToast" class="toast align-items-center text-white border-0 rounded-3 shadow-lg" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body d-flex align-items-center gap-2 fw-semibold">
                <i id="toastIcon" class="bi fs-5"></i>
                <span id="toastMessage"></span>
            </div>
            <button type="button" class="btn-close btn-close-white m-auto me-2" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>
</div>

<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center p-0" style="background: linear-gradient(135deg, #212529 0%, #343a40 100%); font-family: 'Inter', sans-serif;">
    <div class="container my-5 px-3">
        <div class="card border-0 shadow-lg mx-auto rounded-4 overflow-hidden bg-white" style="max-width: 550px;">
            <div class="card-body p-4 p-md-5">
                
                <div class="text-center mb-4">
                    <div class="bg-primary bg-opacity-10 rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px;">
                        <i class="bi bi-shield-lock-fill fs-3 text-primary"></i>
                    </div>
                    <h3 class="fw-bold text-dark mb-1">Account Recovery</h3>
                    <p class="text-muted small">Verify details to establish a new access signature.</p>
                </div>

                <form id="verifyForm">
                    <div class="mb-3">
                        <label class="form-label text-dark fw-semibold small mb-1">Employee ID or Corporate Email</label>
                        <input type="text" id="lookupValue" class="form-control bg-light border-secondary border-opacity-20 py-2.5" placeholder="Enter identification identifier..." required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-dark fw-semibold small mb-1">Linked Phone Number</label>
                        <div class="input-group">
                            <select id="countryCode" class="form-select bg-light border-secondary border-opacity-20 py-2.5" style="max-width: 110px;" required>
                                <option value="+1">+1 (US)</option>
                                <option value="+44">+44 (UK)</option>
                                <option value="+91" selected>+91 (IN)</option>
                                <option value="+61">+61 (AU)</option>
                            </select>
                            <input type="tel" id="purePhoneNumber" class="form-control bg-light border-secondary border-opacity-20 py-2.5" placeholder="9876543210" required>
                        </div>
                    </div>

                    <button type="submit" id="verifyBtn" class="btn btn-primary w-100 py-2.5 fw-bold rounded-3 shadow-sm d-flex align-items-center justify-content-center gap-2">
                        Verify Identity Profile
                    </button>
                </form>

                <form id="updateForm" class="d-none animate-fade-in">
                    <input type="hidden" id="verifiedUserId">
                    
                    <div class="mb-3">
                        <label class="form-label text-dark fw-semibold small mb-1">New Terminal Access Key</label>
                        <input type="password" id="newPassword" class="form-control bg-light border-secondary border-opacity-20 py-2.5" placeholder="••••••••••" required minlength="6">
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-dark fw-semibold small mb-1">Confirm Access Key</label>
                        <input type="password" id="confirmPassword" class="form-control bg-light border-secondary border-opacity-20 py-2.5" placeholder="••••••••••" required minlength="6">
                    </div>

                    <button type="submit" id="updateBtn" class="btn btn-success w-100 py-2.5 fw-bold rounded-3 shadow-sm d-flex align-items-center justify-content-center gap-2">
                        Commit Password Reset
                    </button>
                </form>

                <div class="text-center mt-4 border-top pt-3">
                    <a href="{% url 'employee_login' %}" class="text-secondary small text-decoration-none"><i class="bi bi-arrow-left me-1"></i> Abort and return to login</a>
                </div>

            </div>
        </div>
    </div>
</div>

<style>
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
        animation: fadeIn 0.3s ease-out forwards;
    }
</style>
{% endblock %}

{% block scripts %}
<script>
    function showToast(message, type = 'success') {
        const toastEl = document.getElementById('liveToast');
        const toastMessage = document.getElementById('toastMessage');
        const toastIcon = document.getElementById('toastIcon');
        
        toastMessage.innerText = message;
        toastEl.classList.remove('bg-success', 'bg-danger', 'bg-warning');
        toastIcon.classList.remove('bi-check-circle-fill', 'bi-exclamation-triangle-fill', 'bi-info-circle-fill');

        if (type === 'success') {
            toastEl.classList.add('bg-success');
            toastIcon.classList.add('bi-check-circle-fill');
        } else if (type === 'danger') {
            toastEl.classList.add('bg-danger');
            toastIcon.classList.add('bi-exclamation-triangle-fill');
        } else {
            toastEl.classList.add('bg-warning', 'text-dark');
            toastIcon.classList.add('bi-info-circle-fill');
        }

        const toast = new bootstrap.Toast(toastEl, { delay: 4000 });
        toast.show();
    }

    // Step 1 Trigger Handler
    document.getElementById('verifyForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const verifyBtn = document.getElementById('verifyBtn');
        verifyBtn.disabled = true;
        verifyBtn.innerText = "Processing...";

        const fullPhone = document.getElementById('countryCode').value + ' ' + document.getElementById('purePhoneNumber').value.trim();

        fetch("{% url 'reset_password' %}", {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}'},
            body: JSON.stringify({
                action: 'verify',
                lookup_value: document.getElementById('lookupValue').value.trim(),
                phone_number: fullPhone
            })
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === 'verified') {
                showToast('Identity verified. Please set your new password.');
                document.getElementById('verifiedUserId').value = data.user_id;
                
                // Swap the forms
                document.getElementById('verifyForm').classList.add('d-none');
                document.getElementById('updateForm').classList.remove('d-none');
            } else {
                showToast(data.error, 'danger');
                verifyBtn.disabled = false;
                verifyBtn.innerText = "Verify Identity Profile";
            }
        })
        .catch(() => {
            showToast('Operational system communication failure.', 'danger');
            verifyBtn.disabled = false;
            verifyBtn.innerText = "Verify Identity Profile";
        });
    });

    // Step 2 Trigger Handler
    document.getElementById('updateForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const password = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const updateBtn = document.getElementById('updateBtn');

        if (password !== confirmPassword) {
            showToast('Passphrases do not match.', 'danger');
            return;
        }

        updateBtn.disabled = true;
        updateBtn.innerText = "Updating Database Matrix...";

        fetch("{% url 'reset_password' %}", {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}'},
            body: JSON.stringify({
                action: 'update',
                user_id: document.getElementById('verifiedUserId').value,
                password: password
            })
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === 'success') {
                showToast('Password reset complete! Redirecting to access node...');
                setTimeout(() => {
                    window.location.href = "{% url 'employee_login' %}";
                }, 2000);
            } else {
                showToast(data.error, 'danger');
                updateBtn.disabled = false;
                updateBtn.innerText = "Commit Password Reset";
            }
        })
        .catch(() => {
            showToast('Database write update failure.', 'danger');
            updateBtn.disabled = false;
            updateBtn.innerText = "Commit Password Reset";
        });
    });
</script>
{% endblock %}
